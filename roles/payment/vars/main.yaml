RABBITMQ_HOST: rabbitmq-{{ env }}.rachelsigao.online 
RABBITMQ_USER: roboshop
RABBITMQ_PASSWORD: "{{ lookup('amazon.aws.aws_ssm', '/roboshop/{{ env }}/rabbitmq_password', region='us-east-1', decrypt=True ) }}"